[Definition]
_daemon = nginx

# Catch IPs generating excessive 404s — scanner behaviour.
# Works together with nginx-exploit-scan: this catches generic path brute-forcing
# that doesn't match specific exploit signatures.
#
# Relies on maxretry in jail.local (default: 10 hits within findtime).

failregex = ^<HOST> \S+ \S+ \[.*?\] "\S+ \S+ HTTP/\S+" 404

# Exclude legitimate 404s — static assets, favicon, robots.txt.
# Image/font/media 404s are normal (broken links, cache busting, etc).
ignoreregex = ^<HOST> \S+ \S+ \[.*?\] "\S+ \S+\.(?:jpg|jpeg|png|gif|webp|bmp|tiff|ico|svg|css|js|mjs|woff|woff2|ttf|eot|otf|map|mp4|mp3|webm|pdf|gz|zip)(?:\?\S*)? HTTP/\S+" 404
              ^<HOST> \S+ \S+ \[.*?\] "\S+ /favicon\.ico HTTP/\S+" 404
              ^<HOST> \S+ \S+ \[.*?\] "\S+ /robots\.txt HTTP/\S+" 404
              ^<HOST> \S+ \S+ \[.*?\] "\S+ /sitemap\.xml HTTP/\S+" 404
              ^<HOST> \S+ \S+ \[.*?\] "\S+ /apple-touch-icon\S* HTTP/\S+" 404
