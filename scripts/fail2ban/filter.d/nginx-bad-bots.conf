[Definition]
_daemon = nginx

# Ban known scanner and exploit-tool user agents.
# These UAs are never sent by real browsers or legitimate services.
#
# Confirmed malicious from logs:
#   - zgrab        — internet-wide security scanner (offensive use)
#   - masscan      — TCP port scanner, also used as HTTP prober
#   - ivre-masscan — masscan wrapper for recon framework
#   - libredtail   — exploit scanner seen hitting phpunit/ThinkPHP paths
#   - HTTP Banner Detection — ipip.net scanner

failregex = ^<HOST> \S+ \S+ \[.*?\] "\S+ \S+ HTTP/\S+" \d{3} \d+ "\S+" "(?:[^"]*zgrab[^"]*)"
            ^<HOST> \S+ \S+ \[.*?\] "\S+ \S+ HTTP/\S+" \d{3} \d+ "\S+" "(?:[^"]*masscan[^"]*)"
            ^<HOST> \S+ \S+ \[.*?\] "\S+ \S+ HTTP/\S+" \d{3} \d+ "\S+" "(?:[^"]*libredtail[^"]*)"
            ^<HOST> \S+ \S+ \[.*?\] "\S+ \S+ HTTP/\S+" \d{3} \d+ "\S+" "(?:[^"]*HTTP Banner Detection[^"]*)"
            ^<HOST> \S+ \S+ \[.*?\] "\S+ \S+ HTTP/\S+" \d{3} \d+ "\S+" "(?:[^"]*GenomeCrawlerd[^"]*)"
            ^<HOST> \S+ \S+ \[.*?\] "\S+ \S+ HTTP/\S+" \d{3} \d+ "\S+" "-"$

# Note: python-requests, curl, Go-http-client are NOT blocked here —
# they are used by legitimate monitoring, APIs, and CI tools.
# Those UAs are caught by nginx-404-flood if they scan aggressively.

ignoreregex =
